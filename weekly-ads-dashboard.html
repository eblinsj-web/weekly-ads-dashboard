<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 주간 광고 대시보드</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>window.Chart||document.write('<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"><\/script>')</script>
<style>
  :root{
    --bg:#FAFAFC; --card:#FFFFFF; --ink:#23232E; --ink-soft:#6B6B7B; --ink-faint:#A0A0B0;
    --line:#ECECF2;
    --pink:#F7B8CE; --pink-deep:#DE7BA3; --pink-soft:#FBE4ED;
    --blue:#A9C7F0; --blue-deep:#6E9BDC; --blue-soft:#E8F0FB;
    --mint:#A9DECB; --mint-deep:#56AF8F; --mint-soft:#E6F5EE;
    --lilac:#C9BBEF; --lilac-deep:#9A82DC;
    --up:#56AF8F; --down:#DE7BA3;
    --radius:16px; --shadow:0 1px 3px rgba(40,40,70,.04), 0 1px 2px rgba(40,40,70,.03);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',system-ui,sans-serif;
    background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5;
    padding:40px 24px 80px;letter-spacing:-.01em;}
  .wrap{max-width:1140px;margin:0 auto;}

  .head{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:28px;}
  .head h1{font-size:25px;font-weight:800;letter-spacing:-.025em;}
  .head .sub{color:var(--ink-faint);font-size:13.5px;margin-top:7px;}
  .period-pill{background:var(--card);border:1px solid var(--line);border-radius:10px;
    padding:9px 16px;font-size:13.5px;font-weight:600;color:var(--ink-soft);box-shadow:var(--shadow);}
  .period-pill b{color:var(--ink);font-weight:700;}

  /* Tabs */
  .tabs{display:flex;gap:6px;margin-bottom:4px;flex-wrap:wrap;background:#F0F0F5;padding:5px;border-radius:13px;width:fit-content;}
  .tab{background:transparent;border:none;border-radius:9px;padding:9px 20px;
    font-size:14px;font-weight:600;color:var(--ink-soft);cursor:pointer;display:flex;align-items:center;gap:8px;
    transition:all .15s;}
  .tab .dot{width:7px;height:7px;border-radius:50%;opacity:.5;transition:opacity .15s;}
  .tab[data-ch="zigzag"] .dot{background:var(--pink-deep);}
  .tab[data-ch="naver"] .dot{background:var(--mint-deep);}
  .tab[data-ch="meta"] .dot{background:var(--blue-deep);}
  .tab:hover{color:var(--ink);}
  .tab.active{background:var(--card);color:var(--ink);box-shadow:var(--shadow);font-weight:700;}
  .tab.active .dot{opacity:1;}

  /* Notice */
  .notice{font-size:12.5px;border-radius:11px;padding:11px 15px;margin:18px 0 4px;
    display:flex;gap:9px;align-items:flex-start;line-height:1.5;font-weight:500;border:1px solid;}
  .notice.zz{background:var(--pink-soft);color:#a85478;border-color:#f5d6e2;}
  .notice.nv{background:var(--mint-soft);color:#2f6b51;border-color:#d2ecdf;}
  .notice .ic{flex-shrink:0;opacity:.8;}

  .panel{display:none;}
  .panel.active{display:block;}

  .sec-title{display:flex;align-items:baseline;gap:9px;margin:38px 2px 16px;}
  .sec-title h2{font-size:16px;font-weight:800;letter-spacing:-.02em;}
  .sec-title span{font-size:12.5px;color:var(--ink-faint);font-weight:500;}

  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .kpi{background:var(--card);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);
    border:1px solid var(--line);position:relative;}
  .kpi .label{font-size:12.5px;color:var(--ink-faint);font-weight:600;display:flex;align-items:center;gap:7px;}
  .kpi .label::before{content:"";width:6px;height:6px;border-radius:50%;}
  .kpi.k-cost .label::before{background:var(--pink-deep);}
  .kpi.k-roas .label::before{background:var(--blue-deep);}
  .kpi.k-rev .label::before{background:var(--lilac-deep);}
  .kpi.k-conv .label::before{background:var(--mint-deep);}
  .kpi .val{font-size:27px;font-weight:800;letter-spacing:-.03em;margin:12px 0 8px;word-break:break-all;}
  .kpi .val small{font-size:14px;font-weight:700;color:var(--ink-faint);margin-left:1px;}
  .kpi .chg{font-size:12px;font-weight:700;display:inline-flex;align-items:center;gap:4px;}
  .chg.up{color:var(--up);} .chg.down{color:var(--down);}
  .kpi .chg .base{color:var(--ink-faint);font-weight:500;margin-left:3px;}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line);padding:22px;}
  .card h3{font-size:14.5px;font-weight:800;margin-bottom:3px;letter-spacing:-.02em;}
  .card .hint{font-size:11.5px;color:var(--ink-faint);margin-bottom:16px;}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{padding:9px 8px;text-align:right;border-bottom:1px solid var(--line);}
  th:first-child,td:first-child{text-align:left;color:var(--ink-soft);font-weight:600;}
  thead th{font-size:11px;color:var(--ink-faint);font-weight:700;border-bottom:1.5px solid var(--line);letter-spacing:.02em;}
  tbody tr:last-child td{border-bottom:none;}
  .pct{font-weight:700;font-size:12px;}
  .pct.up{color:var(--up);} .pct.down{color:var(--down);}

  .chart-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line);padding:22px;}
  .legend{display:flex;gap:18px;margin-bottom:16px;flex-wrap:wrap;}
  .legend i{display:inline-flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-soft);font-weight:600;}
  .legend i b{width:10px;height:10px;border-radius:3px;display:inline-block;}
  .chart-box{position:relative;height:300px;overflow:auto;}
  .chart-box table th,.chart-box table td{font-size:12.5px;}

  .camp-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line);padding:22px;overflow-x:auto;}
  .camp-card table{min-width:720px;}
  .camp-card td:first-child{font-weight:600;color:var(--ink);max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .camp-card tbody tr:hover{background:#FAFAFC;}
  .badge{font-size:10.5px;padding:3px 9px;border-radius:6px;background:var(--mint-soft);color:#2f6b51;font-weight:700;white-space:nowrap;}
  .roas-tag{font-weight:800;}

  .media-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;}
  .media{background:var(--card);border-radius:var(--radius);border:1px solid var(--line);box-shadow:var(--shadow);padding:20px;}
  .media .mname{font-size:14px;font-weight:800;margin-bottom:14px;letter-spacing:-.02em;}
  .media .mrow{display:flex;justify-content:space-between;font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--line);}
  .media .mrow:last-child{border-bottom:none;padding-bottom:0;}
  .media .mrow .k{color:var(--ink-faint);}
  .media .mrow .v{font-weight:700;}

  .plan{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--line);padding:8px 22px;}
  .plan-item{display:flex;gap:14px;align-items:flex-start;padding:13px 0;border-bottom:1px solid var(--line);font-size:13px;line-height:1.55;}
  .plan-item:last-child{border-bottom:none;}
  .plan-date{flex-shrink:0;background:var(--pink-soft);color:var(--pink-deep);font-weight:700;font-size:11.5px;
    padding:4px 10px;border-radius:7px;min-width:50px;text-align:center;}
  .plan-item.nodate .plan-date{background:#F2F2F6;color:var(--ink-faint);}
  .plan-text{padding-top:2px;color:var(--ink);}

  .placeholder{background:#FCFCFD;border:1px dashed #DDDDE6;border-radius:var(--radius);
    padding:36px;text-align:center;color:var(--ink-faint);font-size:13px;font-weight:500;line-height:1.6;}

  .loading{text-align:center;padding:60px;color:var(--ink-faint);font-size:14px;}
  .err-box{background:#fff;border:1px dashed var(--pink);border-radius:var(--radius);padding:28px;text-align:center;}
  .err-box p{color:var(--ink-soft);font-size:13px;margin-bottom:14px;line-height:1.6;}
  .err-box label{display:inline-block;background:var(--pink-deep);color:#fff;font-weight:700;font-size:13px;
    padding:10px 20px;border-radius:9px;cursor:pointer;}
  .err-box input{display:none;}

  .foot{margin-top:48px;text-align:center;color:var(--ink-faint);font-size:11.5px;}
  @media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr);}.grid2{grid-template-columns:1fr;}}
  @media(max-width:560px){.kpis{grid-template-columns:1fr;}body{padding:24px 14px 60px;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1>📊 주간 광고 대시보드</h1>
      <div class="sub">에블린 · 채널별 통합 리포트</div>
    </div>
    <div class="period-pill">📅 <b id="periodLabel">기간 불러오는 중…</b></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-ch="zigzag"><span class="dot"></span>지그재그</div>
    <div class="tab" data-ch="naver"><span class="dot"></span>네이버</div>
    <div class="tab" data-ch="meta"><span class="dot"></span>메타</div>
  </div>

  <div id="root"><div class="loading">데이터를 불러오는 중입니다…</div></div>

  <div class="foot">에블린 주간 광고 대시보드 · 시트 업데이트 시 자동 반영 · 데이터 출처: 지그재그 어드민 / 네이버·메타</div>
</div>

<script>
/* ===================== CONFIG ===================== */
const CSV = {
  zigzag: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRc01SCBTxT17Mlhj1CW5GshoxJWPUz6ulkkz9wOEooqiWdCQjtnf745WdaUkyJIrYxSUwnkUbqcwKd/pub?gid=0&single=true&output=csv",
  meta_naver: "https://docs.google.com/spreadsheets/d/e/2PACX-1vRc01SCBTxT17Mlhj1CW5GshoxJWPUz6ulkkz9wOEooqiWdCQjtnf745WdaUkyJIrYxSUwnkUbqcwKd/pub?gid=342271322&single=true&output=csv"
};
const NOTICE = {
  zigzag: "YoY / MoM / WoW 모두 과거 데이터에는 3일치 간접전환이 포함되어 있으나, 직전 주차 데이터에는 간접전환이 일부만 집계되어 있어 감안 필요",
  naver: "네이버 브랜드검색/쇼핑검색/파워링크는 \u201c직접전환매출\u201d 기준 기재 → 매체에는 간접매출까지 포함되어 있어, 지표 차이가 있을 수 있음. 비용은 VAT- 기준"
};
// 메타로 분류할 매체명 (나머지는 네이버)
const META_MEDIA = ["GFA","Meta","META","메타","페이스북","인스타","Facebook","Instagram"];

/* ===================== CSV PARSER ===================== */
function parseCSV(text){
  const rows=[]; let row=[],cell='',q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){
      if(c==='"'){ if(text[i+1]==='"'){cell+='"';i++;} else q=false; }
      else cell+=c;
    }else{
      if(c==='"')q=true;
      else if(c===','){row.push(cell);cell='';}
      else if(c==='\n'){row.push(cell);rows.push(row);row=[];cell='';}
      else if(c==='\r'){}
      else cell+=c;
    }
  }
  if(cell.length||row.length){row.push(cell);rows.push(row);}
  // strip leading empty column (these sheets start with a blank col)
  return rows.map(r=>r.map(x=>x.trim()));
}
const numv = s => { if(s==null)return 0; const t=String(s).replace(/[,%₩\s]/g,'').replace(/[▲▼]/g,''); const n=parseFloat(t); return isNaN(n)?0:n; };
const cleanPct = s => { // ▲53% -> +53% , ▼14% -> -14%
  let t=String(s||'').trim();
  if(!t||t==='-') return '';
  const up=t.includes('▲'), down=t.includes('▼');
  t=t.replace(/[▲▼]/g,'').trim();
  if(down&&!t.startsWith('-')) t='-'+t;
  else if(up&&!t.startsWith('+')) t='+'+t;
  return t;
};

// find row index whose any cell contains key
function findRow(rows,key,from=0){
  for(let i=from;i<rows.length;i++){ if(rows[i].some(c=>c.includes(key))) return i; }
  return -1;
}
// find the column index of a header label within a header row
function colOf(headerRow,label){
  return headerRow.findIndex(c=>c.replace(/\s/g,'').includes(label.replace(/\s/g,'')));
}

/* ===================== FORMATTERS ===================== */
const won = n => '₩'+Math.round(n).toLocaleString('ko-KR');
const num = n => Math.round(n).toLocaleString('ko-KR');
const roasX = n => (n>=100? (n/100).toFixed(2) : n.toFixed(2))+'x'; // handle % vs ratio

/* ===================== ZIGZAG PARSE ===================== */
function parseZigzag(rows){
  const D={};
  // WoW block
  const wowH=findRow(rows,'WoW 누적 비교');
  const cols={}; rows[wowH].forEach((c,i)=>{ if(c)cols[c.replace(/\s/g,'')]=i; });
  const Cc=k=>cols[k];
  const readRow=(ri)=>({
    cost:numv(rows[ri][Cc('광고비(++)')]), imp:numv(rows[ri][Cc('노출수')]),
    click:numv(rows[ri][Cc('클릭수')]), conv:numv(rows[ri][Cc('전환수')]),
    rev:numv(rows[ri][Cc('광고매출액')]), roas:numv(rows[ri][Cc('ROAS')])
  });
  D.lastWeek=readRow(wowH+1); D.thisWeek=readRow(wowH+2);
  D.weekLabelLast=rows[wowH+1][colFirstDate(rows[wowH+1])];
  D.weekLabel=rows[wowH+2][colFirstDate(rows[wowH+2])];
  // change rows (전년도 동월 대비 - contains ▲▼ text)
  D.wowChg=parseChgRow(rows[wowH+3],cols);
  // MoM
  const momH=findRow(rows,'MoM 누적 비교');
  const mcols={}; rows[momH].forEach((c,i)=>{if(c)mcols[c.replace(/\s/g,'')]=i;});
  D.momChg=parseChgRow(rows[momH+3],mcols);
  // YoY
  const yoyH=findRow(rows,'YoY 누적 비교');
  const ycols={}; rows[yoyH].forEach((c,i)=>{if(c)ycols[c.replace(/\s/g,'')]=i;});
  D.yoyChg=parseChgRow(rows[yoyH+3],ycols);

  // Campaigns: header "그룹명"
  const campH=findRow(rows,'그룹명');
  const cc={}; rows[campH].forEach((c,i)=>{if(c)cc[c.replace(/\s/g,'')]=i;});
  D.campaigns=[];
  for(let i=campH+1;i<rows.length;i++){
    const name=rows[i][cc['그룹명']];
    if(!name) break;
    D.campaigns.push({
      name, status:rows[i][cc['현재상태']],
      cost:numv(rows[i][cc['광고비(++)']]), imp:numv(rows[i][cc['노출수']]),
      click:numv(rows[i][cc['클릭수']]), conv:numv(rows[i][cc['전환수']]),
      rev:numv(rows[i][cc['광고매출액']]), ctr:cleanPct(rows[i][cc['CTR']]),
      cvr:cleanPct(rows[i][cc['구매전환율']]), roas:cleanPct(rows[i][cc['ROAS']]),
      zzim:numv(rows[i][cc['찜전환수']])
    });
  }
  // Daily: a header row that has '일자' and '매출액' (not 광고매출액 block)
  let dailyH=-1;
  for(let i=0;i<rows.length;i++){
    const r=rows[i].map(x=>x.replace(/\s/g,''));
    if(r.includes('일자') && r.includes('매출액') && r.includes('광고비(++)')){dailyH=i;break;}
  }
  D.daily=[];
  if(dailyH>=0){
    const dc={}; rows[dailyH].forEach((c,i)=>{if(c)dc[c.replace(/\s/g,'')]=i;});
    for(let i=dailyH+1;i<rows.length;i++){
      const d=rows[i][dc['일자']];
      if(!d || d.includes('총합계') || !/^\d{4}-\d{2}-\d{2}/.test(d)) {
        if(d && d.includes('총합계')) break;
        if(!d) break;
        continue;
      }
      D.daily.push({
        date:d, cost:numv(rows[i][dc['광고비(++)']]), imp:numv(rows[i][dc['노출수']]),
        click:numv(rows[i][dc['클릭수']]), conv:numv(rows[i][dc['전환수']]),
        rev:numv(rows[i][dc['매출액']]), roas:numv(rows[i][dc['ROAS']])
      });
    }
  }
  // Action plan
  D.plan=parsePlan(rows,'인사이트 및 마케팅 액션 플랜');
  return D;
}
function colFirstDate(r){ return r.findIndex(c=>/\d{2}\.\d{2}\.\d{2}/.test(c)); }
function parseChgRow(r,cols){
  const pick=k=>cleanPct(r[cols[k]]);
  return {cost:pick('광고비(++)'),imp:pick('노출수'),click:pick('클릭수'),conv:pick('전환수'),rev:pick('광고매출액'),roas:pick('ROAS')};
}

/* ===================== META/NAVER PARSE ===================== */
function parseMetaNaver(rows){
  const D={meta:{},naver:{}};
  // 광고 유형별 효율 -> media breakdown
  const mh=findRow(rows,'광고 유형별 효율');
  const hdr=rows[mh+1];
  const mc={}; hdr.forEach((c,i)=>{if(c)mc[c.replace(/\s/g,'')]=i;});
  const media=[];
  for(let i=mh+2;i<rows.length;i++){
    const nm=rows[i][mc['매체']];
    if(!nm) break;
    media.push({
      name:nm, cost:numv(rows[i][mc['광고비']]), imp:numv(rows[i][mc['노출']]),
      click:numv(rows[i][mc['클릭']]), ctr:cleanPct(rows[i][mc['CTR(%)']]),
      cpc:numv(rows[i][mc['CPC']]), buy:numv(rows[i][mc['구매']]),
      rev:numv(rows[i][mc['매출']]), roas:numv(rows[i][mc['ROAS(%)']])
    });
  }
  D.meta.media = media.filter(m=>META_MEDIA.some(x=>m.name.includes(x)));
  D.naver.media = media.filter(m=>!META_MEDIA.some(x=>m.name.includes(x)));
  // daily (합산 - 매체 미구분; 사용자 수정 예정)
  const dh=findRow(rows,'일자별 추이');
  const dhdr=rows[dh+1]; const dc={}; dhdr.forEach((c,i)=>{if(c)dc[c.replace(/\s/g,'')]=i;});
  const daily=[];
  for(let i=dh+2;i<rows.length;i++){
    const d=rows[i][dc['일자']];
    if(!d || !/\d{4}\.\s*\d+\.\s*\d+/.test(d)) break;
    daily.push({date:d.replace(/\s/g,''),cost:numv(rows[i][dc['광고비']]),click:numv(rows[i][dc['클릭']]),
      buy:numv(rows[i][dc['구매']]),rev:numv(rows[i][dc['매출']]),roas:numv(rows[i][dc['ROAS(%)']])});
  }
  D.dailyCombined = daily; // 미구분
  // action plan (합산 - 매체 구분 예정)
  D.planCombined = parsePlan(rows,'인사이트 및 마케팅 액션 플랜');
  return D;
}

/* ===================== ACTION PLAN ===================== */
function parsePlan(rows,key){
  const h=findRow(rows,key);
  if(h<0) return [];
  const items=[];
  for(let i=h+1;i<rows.length;i++){
    const txt=rows[i].find(c=>c && c.length>4);
    if(!txt) { if(rows[i].every(c=>!c)) continue; else continue; }
    if(rows[i].some(c=>c.includes('총합계'))) continue;
    const m=txt.match(/^(\d{1,2}\/\d{1,2})/);
    items.push({date:m?m[1]:null, text:m?txt.slice(m[0].length).trim():txt});
  }
  return items;
}

/* ===================== RENDER ===================== */
let DATA={};
function dispChg(s){ // "+53%" -> "▲ 53%", "-14%" -> "▼ 14%"
  if(!s) return '—';
  if(s.startsWith('-')) return '▼ '+s.slice(1);
  if(s.startsWith('+')) return '▲ '+s.slice(1);
  return s;
}
function signClass(s){ return String(s).startsWith('-')?'down':'up'; }

function renderZigzag(D){
  const tw=D.thisWeek,lw=D.lastWeek;
  let h=`<div class="notice zz"><span class="ic">ℹ️</span><span>${NOTICE.zigzag}</span></div>`;
  // KPI
  h+=`<div class="sec-title"><h2>핵심 성과</h2><span>이번 주 (간접전환 3일 기준)</span></div><div class="kpis">`;
  h+=kpiCard('k-cost','광고비',won(tw.cost),D.wowChg.cost);
  h+=kpiCard('k-roas','ROAS',Math.round(tw.roas).toLocaleString('ko-KR'),D.wowChg.roas,'%');
  h+=kpiCard('k-rev','광고매출액',won(tw.rev),D.wowChg.rev);
  h+=kpiCard('k-conv','전환수',num(tw.conv),D.wowChg.conv,'건');
  h+=`</div>`;
  // compare
  h+=`<div class="sec-title"><h2>기간 비교</h2><span>WoW · MoM · YoY</span></div><div class="grid2">`;
  h+=`<div class="card"><h3>주간 비교 (WoW)</h3><div class="hint">${D.weekLabelLast||'전주'} → ${D.weekLabel||'이번주'}</div>
    <table><thead><tr><th>지표</th><th>전주</th><th>이번주</th><th>증감</th></tr></thead><tbody>
    ${cmpRow('광고비',won(lw.cost),won(tw.cost),D.wowChg.cost)}
    ${cmpRow('광고매출액',won(lw.rev),won(tw.rev),D.wowChg.rev)}
    ${cmpRow('전환수',num(lw.conv),num(tw.conv),D.wowChg.conv)}
    ${cmpRow('ROAS',Math.round(lw.roas).toLocaleString('ko-KR')+'%',Math.round(tw.roas).toLocaleString('ko-KR')+'%',D.wowChg.roas)}
    ${cmpRow('클릭수',num(lw.click),num(tw.click),D.wowChg.click)}
    ${cmpRow('노출수',num(lw.imp),num(tw.imp),D.wowChg.imp)}
    </tbody></table></div>`;
  h+=`<div class="card"><h3>월·연 누적 비교</h3><div class="hint">동월 누적 일자 기준 · MoM / YoY</div>
    <table><thead><tr><th>지표</th><th>MoM</th><th>YoY</th></tr></thead><tbody>
    ${cmp2('광고비',D.momChg.cost,D.yoyChg.cost)}
    ${cmp2('광고매출액',D.momChg.rev,D.yoyChg.rev)}
    ${cmp2('전환수',D.momChg.conv,D.yoyChg.conv)}
    ${cmp2('ROAS',D.momChg.roas,D.yoyChg.roas)}
    ${cmp2('클릭수',D.momChg.click,D.yoyChg.click)}
    ${cmp2('노출수',D.momChg.imp,D.yoyChg.imp)}
    </tbody></table></div></div>`;
  // daily trend chart
  h+=`<div class="sec-title"><h2>일자별 추이</h2><span>광고비 · 매출액 · ROAS</span></div>
    <div class="chart-card">
    <div class="legend"><i><b style="background:var(--pink)"></b>광고비</i><i><b style="background:var(--lilac)"></b>매출액</i><i><b style="background:var(--blue-deep)"></b>ROAS</i></div>
    <div class="chart-box"><canvas id="zzChart"></canvas></div></div>`;
  // campaigns
  h+=`<div class="sec-title"><h2>캠페인별 성과</h2><span>당월 누적</span></div>
    <div class="camp-card"><table><thead><tr>
    <th>캠페인 그룹</th><th>상태</th><th>광고비</th><th>매출액</th><th>전환</th><th>CTR</th><th>전환율</th><th>ROAS</th><th>찜전환</th>
    </tr></thead><tbody>`;
  D.campaigns.sort((a,b)=>b.cost-a.cost).forEach(c=>{
    const rv=numv(c.roas);
    h+=`<tr><td title="${c.name}">${c.name}</td><td style="text-align:left"><span class="badge">${c.status}</span></td>
      <td>${won(c.cost)}</td><td>${won(c.rev)}</td><td>${num(c.conv)}</td>
      <td>${c.ctr}</td><td>${c.cvr}</td>
      <td><span class="roas-tag" style="color:${rv>=1000?'#5BB98C':rv>=800?'#7FA8E0':'#E68AAC'}">${c.roas}</span></td>
      <td>${num(c.zzim)}</td></tr>`;
  });
  h+=`</tbody></table></div>`;
  // plan
  h+=`<div class="sec-title"><h2>인사이트 및 마케팅 액션 플랜</h2><span>지그재그</span></div>${renderPlan(D.plan)}`;
  return h;
}

function renderNaver(D){
  let h=`<div class="notice nv"><span class="ic">ℹ️</span><span>${NOTICE.naver}</span></div>`;
  h+=`<div class="sec-title"><h2>매체별 효율</h2><span>네이버 (브랜드검색 · 협력광고 · 쇼핑검색 · 파워링크)</span></div>`;
  h+=renderMediaGrid(D.naver.media,'nv');
  h+=`<div class="sec-title"><h2>일자별 추이</h2><span>네이버</span></div>
    <div class="placeholder">네이버 매체 기준 일자별 추이 데이터를 시트에 추가해 주시면 이 자리에 그래프로 표시됩니다.<br>(현재 시트의 일자별 추이는 메타·네이버 합산으로 매체 구분이 필요합니다)</div>`;
  h+=`<div class="sec-title"><h2>인사이트 및 마케팅 액션 플랜</h2><span>네이버</span></div>
    <div class="placeholder" style="text-align:left;padding:22px">현재 액션 플랜이 메타·네이버 합산입니다. 매체별로 구분해 주시면 네이버 항목만 추려 표시합니다.<br><br><b style="color:var(--ink-soft)">참고 — 현재 합산 항목:</b></div>
    ${renderPlan(D.planCombined)}`;
  return h;
}

function renderMeta(D){
  let h=`<div class="sec-title"><h2>매체별 효율</h2><span>메타 (GFA)</span></div>`;
  if(D.meta.media.length===0){
    h+=`<div class="placeholder">메타(GFA) 매체 데이터가 없습니다.</div>`;
  }else{
    h+=renderMediaGrid(D.meta.media,'mt');
  }
  h+=`<div class="sec-title"><h2>일자별 추이</h2><span>메타</span></div>
    <div class="placeholder">메타 매체 기준 일자별 추이 데이터를 시트에 추가해 주시면 이 자리에 그래프로 표시됩니다.<br>(현재 시트의 일자별 추이는 메타·네이버 합산으로 매체 구분이 필요합니다)</div>`;
  h+=`<div class="sec-title"><h2>인사이트 및 마케팅 액션 플랜</h2><span>메타</span></div>
    <div class="placeholder" style="text-align:left;padding:22px">현재 액션 플랜이 메타·네이버 합산입니다. 매체별로 구분해 주시면 메타 항목만 추려 표시합니다.</div>`;
  return h;
}

function renderMediaGrid(media,tagcls){
  if(!media||!media.length) return `<div class="placeholder">데이터 없음</div>`;
  let h=`<div class="media-grid">`;
  media.forEach(m=>{
    h+=`<div class="media"><div class="mname">${m.name}</div>
      <div class="mrow"><span class="k">광고비</span><span class="v">${won(m.cost)}</span></div>
      <div class="mrow"><span class="k">노출</span><span class="v">${num(m.imp)}</span></div>
      <div class="mrow"><span class="k">클릭</span><span class="v">${num(m.click)}</span></div>
      <div class="mrow"><span class="k">CTR</span><span class="v">${m.ctr}%</span></div>
      <div class="mrow"><span class="k">구매</span><span class="v">${num(m.buy)}</span></div>
      <div class="mrow"><span class="k">매출</span><span class="v">${won(m.rev)}</span></div>
      <div class="mrow"><span class="k">ROAS</span><span class="v" style="color:${m.roas>=400?'#5BB98C':m.roas>=200?'#7FA8E0':'#E68AAC'}">${m.roas}%</span></div>
    </div>`;
  });
  return h+`</div>`;
}

function renderPlan(items){
  if(!items||!items.length) return `<div class="placeholder">액션 플랜 항목이 없습니다.</div>`;
  let h=`<div class="plan">`;
  items.forEach(it=>{
    h+=`<div class="plan-item ${it.date?'':'nodate'}">
      <span class="plan-date">${it.date||'—'}</span>
      <span class="plan-text">${it.text}</span></div>`;
  });
  return h+`</div>`;
}

function kpiCard(cls,label,val,chg,suf){
  const c=signClass(chg);
  return `<div class="kpi ${cls}"><div class="label">${label}</div>
    <div class="val">${val}${suf?`<small>${suf}</small>`:''}</div>
    <div class="chg ${c}">${dispChg(chg)}<span class="base">vs 전주</span></div></div>`;
}
function cmpRow(name,a,b,chg){
  return `<tr><td>${name}</td><td>${a}</td><td>${b}</td><td><span class="pct ${signClass(chg)}">${dispChg(chg)}</span></td></tr>`;
}
function cmp2(name,mom,yoy){
  return `<tr><td>${name}</td><td><span class="pct ${signClass(mom)}">${dispChg(mom)}</span></td><td><span class="pct ${signClass(yoy)}">${dispChg(yoy)}</span></td></tr>`;
}

/* ===================== CHART ===================== */
function drawZzChart(D){
  const el=document.getElementById('zzChart'); if(!el) return;
  const d=D.daily;
  if(typeof Chart==='undefined'){
    el.parentElement.innerHTML='<table><thead><tr><th>일자</th><th>광고비</th><th>매출액</th><th>ROAS</th></tr></thead><tbody>'+
      d.map(x=>`<tr><td>${x.date.slice(5)}</td><td>${won(x.cost)}</td><td>${won(x.rev)}</td><td>${Math.round(x.roas).toLocaleString('ko-KR')}%</td></tr>`).join('')+'</tbody></table>';
    return;
  }
  new Chart(el,{data:{labels:d.map(x=>x.date.slice(5)),datasets:[
    {type:'bar',label:'광고비',data:d.map(x=>x.cost),backgroundColor:'#F7B8CE',borderRadius:6,yAxisID:'y',order:3},
    {type:'bar',label:'매출액',data:d.map(x=>x.rev),backgroundColor:'#C9BBEF',borderRadius:6,yAxisID:'y',order:2},
    {type:'line',label:'ROAS',data:d.map(x=>x.roas),borderColor:'#7FA8E0',backgroundColor:'#7FA8E0',borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#fff',pointBorderWidth:2,tension:.35,yAxisID:'y1',order:1}
  ]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label==='ROAS'?' ROAS '+Math.round(c.parsed.y).toLocaleString('ko-KR')+'%':' '+c.dataset.label+' '+won(c.parsed.y)}}},
    scales:{y:{position:'left',grid:{color:'#F0F0F6'},ticks:{callback:v=>'₩'+(v/10000).toFixed(0)+'만',color:'#9A9AAC',font:{size:11}}},
      y1:{position:'right',grid:{drawOnChartArea:false},min:0,ticks:{callback:v=>v+'%',color:'#7FA8E0',font:{size:11}}},
      x:{grid:{display:false},ticks:{color:'#6B6B7B',font:{size:12}}}}}});
}

/* ===================== TAB SWITCH ===================== */
let currentCh='zigzag';
function show(ch){
  currentCh=ch;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.ch===ch));
  const root=document.getElementById('root');
  if(ch==='zigzag'){ root.innerHTML=renderZigzag(DATA.zigzag); setTimeout(()=>drawZzChart(DATA.zigzag),50); }
  else if(ch==='naver'){ root.innerHTML=renderNaver(DATA.mn); }
  else if(ch==='meta'){ root.innerHTML=renderMeta(DATA.mn); }
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>show(t.dataset.ch)));

/* ===================== LOAD ===================== */
async function fetchCSV(url){
  const res=await fetch(url); if(!res.ok) throw new Error(res.status); return await res.text();
}
async function init(){
  try{
    const [zz,mn]=await Promise.all([fetchCSV(CSV.zigzag),fetchCSV(CSV.meta_naver)]);
    DATA.zigzag=parseZigzag(parseCSV(zz));
    DATA.mn=parseMetaNaver(parseCSV(mn));
    document.getElementById('periodLabel').textContent=DATA.zigzag.weekLabel||'2026.06.01 ~ 06.07';
    show('zigzag');
  }catch(e){
    showUploadFallback(e);
  }
}
function showUploadFallback(e){
  document.getElementById('root').innerHTML=
    `<div class="err-box"><p>시트를 자동으로 불러오지 못했습니다 (${e.message}).<br>
    구글 시트의 CORS 정책 때문일 수 있습니다. 두 CSV 파일을 직접 선택하면 바로 표시됩니다.<br>
    <small>지그재그 CSV → 첫 번째 / 메타·네이버 CSV → 두 번째 순서로 선택</small></p>
    <label>CSV 파일 2개 선택<input type="file" id="fileIn" accept=".csv" multiple></label></div>`;
  document.getElementById('fileIn').addEventListener('change',async ev=>{
    const files=[...ev.target.files];
    for(const f of files){
      const txt=await f.text(); const rows=parseCSV(txt);
      if(rows.some(r=>r.some(c=>c.includes('WoW 누적 비교')||c.includes('당월 누적 캠페인별')))) DATA.zigzag=parseZigzag(rows);
      else if(rows.some(r=>r.some(c=>c.includes('광고 유형별 효율')))) DATA.mn=parseMetaNaver(rows);
    }
    if(DATA.zigzag){document.getElementById('periodLabel').textContent=DATA.zigzag.weekLabel||'';show('zigzag');}
  });
}
init();
</script>
